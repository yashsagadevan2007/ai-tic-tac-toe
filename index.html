<!DOCTYPE html>
<html>
<head>
<title>Tic Tac Toe PRO</title>

<style>
body {
    background: black;
    color: cyan;
    text-align: center;
    font-family: Arial;
}

#difficultyScreen, #gameScreen { display: none; }

.title {
    font-size: 70px;
    text-shadow: 0 0 30px cyan;
}

button {
    background: cyan;
    border: none;
    padding: 15px 30px;
    margin: 10px;
    font-size: 20px;
    cursor: pointer;
}

.board {
    display: grid;
    grid-template-columns: repeat(3, 100px);
    gap: 20px;
    justify-content: center;
    margin-top: 30px;
}

.cell {
    width: 100px;
    height: 100px;
    border: 2px solid cyan;
    box-shadow: 0 0 15px cyan;
    font-size: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: 0.2s;
}

.cell:active {
    background: blue;
    transform: scale(0.8);
    box-shadow: 0 0 40px blue;
}

.win {
    background: lime;
    color: black;
    box-shadow: 0 0 40px lime;
}

#chat {
    margin-top: 20px;
    border: 2px solid cyan;
    padding: 10px 20px;
    border-radius: 20px;
    display: inline-block;
}

#score {
    margin-top: 10px;
    font-size: 20px;
}

#result {
    margin-top: 10px;
    font-size: 24px;
    font-weight: bold;
}
</style>
</head>

<body>

<div id="startScreen">
    <div class="title">🎮 TIC TAC TOE 🤖</div>
    <button onclick="goDifficulty()">▶ START</button>
</div>

<div id="difficultyScreen">
    <div class="title">⚙ SELECT LEVEL</div>
    <button onclick="startGame('easy')">😄 Easy</button>
    <button onclick="startGame('medium')">😐 Medium</button>
    <button onclick="startGame('hard')">😈 Hard</button>
    <br>
    <button onclick="goBack()">🔙 Back</button>
</div>

<div id="gameScreen">
    <div id="score"></div>
    <div id="result"></div>

    <div id="board" class="board"></div>

    <div id="chat">🤖 Ready</div>

    <br>
    <button onclick="restart()">🔄 Restart</button>
    <button onclick="goBackToMenu()">🔙 Back</button>
</div>

<!-- SOUNDS -->
<audio id="clickSound" src="https://www.soundjay.com/buttons/button-09.mp3"></audio>
<audio id="winSound" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>
<audio id="bgSound" src="https://www.soundjay.com/ambient/sounds/keyboard-typing-01.mp3" loop></audio>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
let board = ["","","","","","","","",""];
let isPlayerTurn = true;
let difficulty = "easy";

/* 🏆 SCORE SYSTEM */
let playerScore = localStorage.getItem("pScore") || 0;
let aiScore = localStorage.getItem("aScore") || 0;

function saveScore(){
    localStorage.setItem("pScore", playerScore);
    localStorage.setItem("aScore", aiScore);
}

function updateScore(){
    document.getElementById("score").innerText =
        "🏆 You: "+playerScore+"  |  AI: "+aiScore;
}

/* 💬 AI MESSAGES */
function aiMessage(type){
    const messages = {
        start: ["😈 Let’s begin","🤖 Ready","🔥 Show me your skills"],
        move: ["😏 Interesting","👀 I see","🤔 Thinking..."],
        aiWin: ["😈 I win","💀 Too easy"],
        playerWin: ["👏 Nice","😳 Good move"],
        draw: ["🤝 Draw","😐 Balanced"]
    };
    let arr = messages[type];
    return arr[Math.floor(Math.random()*arr.length)];
}

/* Navigation */
function goDifficulty(){
    startScreen.style.display="none";
    difficultyScreen.style.display="block";
}

function goBack(){
    difficultyScreen.style.display="none";
    startScreen.style.display="block";
}

function goBackToMenu(){
    gameScreen.style.display="none";
    startScreen.style.display="block";
}

function startGame(level){
    difficulty = level;
    difficultyScreen.style.display="none";
    gameScreen.style.display="block";
    createBoard();
    updateScore();
    document.getElementById("result").innerText="";
    chat(aiMessage("start"));
    play("bgSound");
}

/* Board */
function createBoard(){
    board = ["","","","","","","","",""];
    isPlayerTurn = true;
    const b=document.getElementById("board");
    b.innerHTML="";

    board.forEach((_,i)=>{
        let cell=document.createElement("div");
        cell.className="cell";

        cell.onclick=()=>{
            play("clickSound");
            playerMove(i);
        };

        b.appendChild(cell);
    });
}

/* Sound */
function play(id){
    let s=document.getElementById(id);
    s.currentTime=0;
    s.play();
}

/* Player */
function playerMove(i){
    if(!isPlayerTurn || board[i]!="") return;

    board[i]="X";
    update();

    if(check("X")){
        playerScore++;
        saveScore();
        updateScore();

        document.getElementById("result").innerText="🏆 You Win!";
        chat(aiMessage("playerWin"));
        winEffects();
        return;
    }

    if(isDraw()){
        document.getElementById("result").innerText="🤝 Draw!";
        chat(aiMessage("draw"));
        return;
    }

    chat(aiMessage("move"));
    isPlayerTurn=false;

    setTimeout(aiMove,1500);
}

/* AI */
function aiMove(){
    let empty=board.map((v,i)=>v===""?i:null).filter(v=>v!==null);
    let move;

    if(difficulty==="easy"){
        move=empty[Math.floor(Math.random()*empty.length)];
    } else if(difficulty==="medium"){
        move=Math.random()<0.5?bestMove():empty[Math.floor(Math.random()*empty.length)];
    } else {
        move=bestMove();
    }

    board[move]="O";
    update();

    if(check("O")){
        aiScore++;
        saveScore();
        updateScore();

        document.getElementById("result").innerText="😈 AI Wins!";
        chat(aiMessage("aiWin"));
        play("winSound");
        return;
    }

    if(isDraw()){
        document.getElementById("result").innerText="🤝 Draw!";
        chat(aiMessage("draw"));
        return;
    }

    chat("🤖 Your turn");
    isPlayerTurn=true;
}

/* Update */
function update(){
    document.querySelectorAll(".cell").forEach((c,i)=>{
        c.innerText=board[i];
    });
}

/* Chat */
function chat(msg){
    document.getElementById("chat").innerText="🤖 "+msg;
}

/* Restart */
function restart(){
    createBoard();
    document.getElementById("result").innerText="";
    chat("😈 New match");
}

/* Draw */
function isDraw(){
    return board.every(c=>c!=="");
}

/* Win */
function check(p){
    const wins=[
        [0,1,2],[3,4,5],[6,7,8],
        [0,3,6],[1,4,7],[2,5,8],
        [0,4,8],[2,4,6]
    ];
    for(let combo of wins){
        if(combo.every(i=>board[i]===p)){
            combo.forEach(i=>{
                document.querySelectorAll(".cell")[i].classList.add("win");
            });
            return true;
        }
    }
    return false;
}

/* Effects */
function winEffects(){
    play("winSound");
    confetti({particleCount:300,spread:100});
}

/* Smart AI */
function bestMove(){
    let best=-Infinity,move;
    for(let i=0;i<9;i++){
        if(board[i]==""){
            board[i]="O";
            let score=minimax(false);
            board[i]="";
            if(score>best){best=score;move=i;}
        }
    }
    return move;
}

function minimax(isMax){
    if(check("O")) return 1;
    if(check("X")) return -1;
    if(!board.includes("")) return 0;

    if(isMax){
        let best=-Infinity;
        for(let i=0;i<9;i++){
            if(board[i]==""){
                board[i]="O";
                best=Math.max(best,minimax(false));
                board[i]="";
            }
        }
        return best;
    } else {
        let best=Infinity;
        for(let i=0;i<9;i++){
            if(board[i]==""){
                board[i]="X";
                best=Math.min(best,minimax(true));
                board[i]="";
            }
        }
        return best;
    }
}
</script>

</body>
</html>
